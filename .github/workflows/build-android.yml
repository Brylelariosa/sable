name: Build Sable Rapier for Android (aarch64)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Sable repo
        uses: actions/checkout@v4

      - name: Install Rust (lets project pick its own toolchain)
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android target to project nightly toolchain
        working-directory: common/src/main/rust/rapier
        run: rustup target add aarch64-linux-android

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Configure Cargo for Android cross-compile
        run: |
          NDK=$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$NDK/aarch64-linux-android21-clang"
          ar = "$NDK/llvm-ar"
          EOF

      - name: Set NDK env vars
        run: |
          NDK=$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "CC_aarch64_linux_android=$NDK/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=$NDK/llvm-ar" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK/aarch64-linux-android21-clang" >> $GITHUB_ENV

      - name: Build native library
        working-directory: common/src/main/rust/rapier
        run: cargo build --release --target aarch64-linux-android

      - name: Collect and rename output
        run: |
          find . -path "*/aarch64-linux-android/release/lib*.so" | head -5
          find . -path "*/aarch64-linux-android/release/lib*.so" -exec cp {} sable_rapier_aarch64_android.so \;
          ls -la sable_rapier_aarch64_android.so

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: sable_rapier_aarch64_android
          path: sable_rapier_aarch64_android.so
